<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot LLM Locale</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --giallo-pantone: #FFDA00;
            --nero: #000000;
            --bianco: #FFFFFF;
            --grigio-chiaro: #F5F5F5;
            --grigio-medio: #E0E0E0;
            --grigio-scuro: #666666;
            --rosso-stop: #E53935;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bianco);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .chat-container {
            width: 100%;
            max-width: 480px;
            min-height: 200px;
            height: auto;
            background: var(--bianco);
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid var(--grigio-medio);
        }

        .chat-header {
            background: var(--nero);
            padding: 6px 14px;
            text-align: center;
            color: var(--giallo-pantone);
            font-size: 0.85rem;
            font-weight: bold;
            border-bottom: 2px solid var(--giallo-pantone);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header .title {
            flex: 1;
            text-align: center;
        }

        .chat-header .clear-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s, opacity 0.2s;
            opacity: 0.7;
        }

        .chat-header .clear-btn:hover {
            opacity: 1;
            transform: scale(1.15);
        }

        .chat-header .clear-btn svg {
            width: 20px;
            height: 20px;
            fill: var(--giallo-pantone);
            transition: fill 0.2s;
        }

        .chat-header .clear-btn:hover svg {
            fill: var(--rosso-stop);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 4px 12px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            background: var(--bianco);
            min-height: 120px;
        }

        .message {
            max-width: 85%;
            padding: 6px 10px;
            border-radius: 14px;
            line-height: 1.4;
            animation: fadeIn 0.25s ease;
            font-size: 0.8rem;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            background: var(--giallo-pantone);
            color: var(--nero);
            border-bottom-right-radius: 4px;
            font-weight: 500;
        }

        .message.bot {
            align-self: flex-start;
            background: var(--grigio-chiaro);
            color: var(--nero);
            border-bottom-left-radius: 4px;
            border: 1px solid var(--grigio-medio);
        }

        .message.loading {
            background: var(--grigio-chiaro);
            color: var(--grigio-scuro);
            font-style: italic;
            font-size: 0.75rem;
        }

        .message.stopped {
            background: #FFEBEE;
            color: var(--rosso-stop);
            font-style: italic;
            font-size: 0.75rem;
            border: 1px solid var(--rosso-stop);
        }

        .message.error-msg {
            background: #FFEBEE;
            color: #C62828;
            font-size: 0.75rem;
            border: 1px solid #EF9A9A;
        }

        .chat-input-area {
            padding: 4px 12px;
            background: var(--nero);
            display: flex;
            gap: 6px;
            border-top: 2px solid var(--giallo-pantone);
        }

        #userInput {
            flex: 1;
            padding: 8px 14px;
            border: 1.5px solid var(--grigio-medio);
            border-radius: 20px;
            background: var(--bianco);
            color: var(--nero);
            font-size: 0.8rem;
            outline: none;
            transition: border-color 0.2s;
        }

        #userInput:focus {
            border-color: var(--giallo-pantone);
        }

        #userInput::placeholder {
            color: var(--grigio-scuro);
            font-size: 0.8rem;
        }

        #userInput:disabled {
            background: var(--grigio-chiaro);
            color: var(--grigio-scuro);
        }

        #sendBtn {
            padding: 8px 18px;
            border: none;
            border-radius: 20px;
            background: var(--giallo-pantone);
            color: var(--nero);
            font-size: 0.8rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s, box-shadow 0.2s;
            min-width: 60px;
        }

        #sendBtn:hover {
            background: #FFE44D;
            transform: scale(1.03);
            box-shadow: 0 2px 8px rgba(255, 218, 0, 0.4);
        }

        #sendBtn:disabled {
            background: var(--grigio-medio);
            color: var(--grigio-scuro);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        #sendBtn.stop-btn {
            background: var(--rosso-stop);
            color: var(--bianco);
            min-width: 42px;
            padding: 8px 12px;
            font-size: 1rem;
        }

        #sendBtn.stop-btn:hover {
            background: #EF5350;
        }

        /* Scrollbar personalizzata */
        .chat-messages::-webkit-scrollbar {
            width: 5px;
        }
        .chat-messages::-webkit-scrollbar-track {
            background: var(--grigio-chiaro);
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background: var(--nero);
            border-radius: 3px;
        }
        .chat-messages::-webkit-scrollbar-thumb:hover {
            background: var(--giallo-pantone);
        }
    </style>

<base target="_blank">
</head>
<body>

    <div class="chat-container">
        <div class="chat-header">
            <span class="title">🤖 Formula AI Agent Query</span>
            <button class="clear-btn" onclick="clearChat()" title="Svuota la chat">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M15.5 4l-1-1h-5l-1 1H5v2h14V4zM6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM8 9h8v2H8V9z"/>
                </svg>
            </button>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="message bot" id="welcome-msg">Ciao! Mi faccio in DUE per te. Come posso aiutarti?</div>
        </div>

        <div class="chat-input-area">
            <input 
                type="text" 
                id="userInput" 
                placeholder="Scrivi un messaggio..." 
                autocomplete="off"
            >
            <button id="sendBtn" onclick="handleButtonClick()">Invia</button>
        </div>
    </div>

    <script>
        // CONFIGURAZIONE
        const OLLAMA_URL = 'http://localhost:11434/api/generate';
        const MODEL = 'qwen2.5:7b';

        const chatMessages = document.getElementById('chatMessages');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');

        let abortController = null;
        let isGenerating = false;

        // Invio con tasto Enter
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !isGenerating) sendMessage();
        });

        function handleButtonClick() {
            if (isGenerating) {
                stopGeneration();
            } else {
                sendMessage();
            }
        }

        function stopGeneration() {
            if (abortController) {
                abortController.abort();
                abortController = null;
            }
        }

        function clearChat() {
            // Se c'è una generazione in corso, la interrompe prima
            if (isGenerating) {
                stopGeneration();
            }
            // Rimuove tutti i messaggi
            chatMessages.innerHTML = '';
            // Ri-aggiunge il messaggio di benvenuto
            const welcome = document.createElement('div');
            welcome.className = 'message bot';
            welcome.id = 'welcome-msg';
            welcome.textContent = 'Ciao! Mi faccio in DUE per te. Come posso aiutarti?';
            chatMessages.appendChild(welcome);
            // Riporta il focus sull'input
            userInput.focus();
        }

        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            // Rimuove il messaggio di benvenuto se presente
            const welcomeMsg = document.getElementById('welcome-msg');
            if (welcomeMsg) welcomeMsg.remove();

            // Disabilita input e mostra stop
            userInput.value = '';
            userInput.disabled = true;
            isGenerating = true;
            sendBtn.textContent = '⏹';
            sendBtn.classList.add('stop-btn');

            // Mostra messaggio utente
            addMessage(message, 'user');

            // Mostra indicatore di caricamento
            const loadingId = addMessage('Sto pensando...', 'loading');

            // Crea AbortController per poter interrompere
            abortController = new AbortController();

            try {
                const response = await fetch(OLLAMA_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    signal: abortController.signal,
                    body: JSON.stringify({
                        model: MODEL,
                        prompt: message,
                        stream: false
                    })
                });

                if (!response.ok) {
                    throw new Error('Errore di connessione con Ollama');
                }

                const data = await response.json();

                // Rimuovi caricamento e mostra risposta
                removeMessage(loadingId);
                addMessage(data.response, 'bot');

            } catch (error) {
                removeMessage(loadingId);

                if (error.name === 'AbortError') {
                    addMessage('⏹ Generazione interrotta dall'utente.', 'stopped');
                } else {
                    addMessage('❌ Errore: ' + error.message, 'error-msg');
                    console.error(error);
                }
            } finally {
                // Riabilita input
                isGenerating = false;
                abortController = null;
                userInput.disabled = false;
                sendBtn.textContent = 'Invia';
                sendBtn.classList.remove('stop-btn');
                userInput.focus();
            }
        }

        function addMessage(text, type) {
            const div = document.createElement('div');
            div.className = `message ${type}`;
            div.textContent = text;
            div.id = 'msg-' + Date.now();
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            return div.id;
        }

        function removeMessage(id) {
            const el = document.getElementById(id);
            if (el) el.remove();
        }
    </script>

</body>
</html>
